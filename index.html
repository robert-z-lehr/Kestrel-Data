""<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kestrel Session Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    html, body { height: 100%; margin: 0; font-family: Arial, sans-serif; }
    #map { height: 100vh; width: 100%; }
    .info-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1000;
      background: rgba(255,255,255,0.96);
      padding: 12px 14px;
      border-radius: 8px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.25);
      max-width: 340px;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <div class="info-panel">
    <b>Kestrel Session Map</b><br>
    Click markers for summary stats.
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
    const map = L.map('map').setView([30.286, -97.737], 15);
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    fetch('data/sessions.geojson')
      .then(r => r.json())
      .then(data => {
        L.geoJSON(data, {
          pointToLayer: (f, latlng) => L.circleMarker(latlng, {radius:8}),
          onEachFeature: (f, layer) => {
            const p = f.properties;
            layer.bindPopup(
              `<b>${p.file_name}</b><br>WBGT mean: ${p['Wet Bulb Globe Temperature__mean']}`
            );
          }
        }).addTo(map);
      });
  </script>
</body>
</html>
""
